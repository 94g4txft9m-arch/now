# Nasadenie statického webu STRINGS z vetvy gh-pages (obsah v koreni vetvy).
# V GitHube: Settings → Pages → Build and deployment → Source: „GitHub Actions“
# (nie „Deploy from a branch“). Prvý beh po zapnutí môže vyžadovať schválenie environment „github-pages“.
name: Deploy STRINGS static (gh-pages)

on:
  push:
    branches: [gh-pages]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
